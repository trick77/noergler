name: Dependabot auto-merge

on: pull_request

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-merge:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - id: metadata
        uses: dependabot/fetch-metadata@v3
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
      - id: gate
        run: |
          if [ "${{ steps.metadata.outputs.update-type }}" = "version-update:semver-patch" ] || \
             [ "${{ steps.metadata.outputs.update-type }}" = "version-update:semver-minor" ]; then
            echo "merge=true" >> "$GITHUB_OUTPUT"
          else
            echo "merge=false" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.gate.outputs.merge == 'true'
        id: wait
        uses: fountainhead/action-wait-for-check@v1.2.0
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          checkName: test
          ref: ${{ github.event.pull_request.head.sha }}
          timeoutSeconds: 1800
      - if: steps.gate.outputs.merge == 'true' && steps.wait.outputs.conclusion == 'success'
        run: gh pr merge --squash --delete-branch "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

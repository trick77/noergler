services:
  noergler:
    build:
      context: .
      dockerfile: Containerfile
    ports:
      - "8080:8080"
    env_file: .env
    environment:
      - DATABASE_URL=${DATABASE_URL:-}
    volumes:
      - ./prompts:/app/prompts:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

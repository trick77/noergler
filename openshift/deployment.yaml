apiVersion: apps/v1
kind: Deployment
metadata:
  name: noergler
spec:
  replicas: 1
  selector:
    matchLabels:
      app: noergler
  template:
    metadata:
      labels:
        app: noergler
    spec:
      initContainers:
        - name: migrate
          image: registry.example.com/noergler/noergler:latest
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: noergler
            - secretRef:
                name: noergler
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
      containers:
        - name: noergler
          image: registry.example.com/noergler/noergler:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: noergler
            - secretRef:
                name: noergler
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 60
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m

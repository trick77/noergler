apiVersion: apps/v1
kind: Deployment
metadata:
  name: nitpick
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nitpick
  template:
    metadata:
      labels:
        app: nitpick
    spec:
      containers:
        - name: nitpick
          image: registry.example.com/nitpick/nitpick:latest
          ports:
            - containerPort: 8080
          envFrom:
            - secretRef:
                name: nitpick
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 256Mi
              cpu: 500m
